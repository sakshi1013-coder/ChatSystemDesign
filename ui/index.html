<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Message Sharding UI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="dashboard">
        <header>
            <div class="header-content">
                <h1>Sharding Simulator</h1>
                <p>Observe the consequences of horizontal scaling strategies at scale.</p>
            </div>
            
            <div class="controls-panel">
                <div class="control-group">
                    <label>Strategy</label>
                    <select id="strategy-select">
                        <option value="user">Day 6: User-Based Sharding</option>
                        <option value="channel">Day 7: Channel-Based Sharding</option>
                        <option value="hash">Day 8: Hash-Based Sharding</option>
                    </select>
                </div>
                
                <div class="control-group buttons">
                    <button id="btn-reset" class="btn-secondary">Reset System</button>
                    <button id="btn-normal" class="btn-primary">1k Normal Traffic</button>
                    <button id="btn-spike" class="btn-danger">Trigger Viral Spike (Ch 99)</button>
                </div>
            </div>
        </header>

        <main>
            <div class="shards-container" id="shards-container">
                <!-- Shard elements will be injected here by JS -->
            </div>
            
            <div class="system-logs">
                <div class="log-header">
                    <h3>System Events</h3>
                    <span id="total-messages-badge">Total: 0 msgs</span>
                </div>
                <div class="log-content" id="log-content">
                    <div class="log-item info">System initialized safely running on 3 shards.</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Interactive JS Sandbox holding the exact logic translated from the python models -->
    <script src="app.js"></script>
</body>
</html>
